<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Search - Myway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Myway<span>.</span></div>
            <div id="breadcrumb">
                <a href="employer.html">Dashboard</a> > Candidate Search
            </div>
        </nav>
    </header>
    <main>
        <section class="page-header">
            <h1>Search Candidates</h1>
            <p>Filter by skills, persona, and experience</p>
        </section>
        <div class="search-filters">
            <input type="text" id="search-input" placeholder="Search by skill...">
            <select id="persona-filter">
                <option value="">All Personas</option>
                <option value="Leader">Leader</option>
                <option value="Analyst">Analyst</option>
                <option value="Creative">Creative</option>
                <option value="Supporter">Supporter</option>
            </select>
        </div>
        <div id="candidates-grid" class="role-card-grid"></div>
    </main>
    <script src="features/candidate-search.js"></script>
</body>
</html>
