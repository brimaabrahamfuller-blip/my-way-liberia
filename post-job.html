<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Myway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Myway<span>.</span></div>
            <div id="breadcrumb">
                <a href="employer.html">Dashboard</a> > Post Job
            </div>
        </nav>
    </header>
    <main>
        <section class="page-header">
            <h1>Post a Job</h1>
            <p>Hire top talent from Liberia in minutes</p>
        </section>
        <form class="form-card" id="job-form" style="max-width: 600px; margin: 2rem auto;">
            <input type="text" placeholder="Job Title" required>
            <textarea placeholder="Job Description" style="width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
            <select required>
                <option disabled selected>Select Job Type</option>
                <option>Full-time</option>
                <option>Part-time</option>
                <option>Contract</option>
            </select>
            <input type="text" placeholder="Location" required>
            <input type="text" placeholder="Salary Range (optional)">
            <button type="submit" class="btn btn-primary">Publish Job Posting</button>
        </form>
    </main>
    <script>
        document.getElementById('job-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Job posted successfully! Your listing is now live.');
            window.location.href = 'employer.html';
        });
    </script>
</body>
</html>
