<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Myway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><nav class="navbar"><div class="logo">Myway<span>.</span></div><div id="breadcrumb"><a href="student.html">Dashboard</a> > Settings</div></nav></header>
<main>
<section class="page-header"><h1>Settings</h1><p>Configure personal preferences and app behavior</p></section>
<section class="form-card" style="max-width: 700px; margin: 2rem auto;">
<label style="display:block; margin-bottom:8px;">Theme</label>
<select id="theme-select" style="width:100%; padding: 12px; border-radius: 8px; border:1px solid #dbeafe;">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>
<label style="display:block; margin: 14px 0 8px;">Language</label>
<select id="lang-select" style="width:100%; padding:12px; border-radius:8px; border:1px solid #dbeafe;">
<option value="en">English</option>
<option value="lr">Kreyol</option>
</select>
<button class="btn btn-primary" id="save-settings" style="margin-top:14px;">Save Settings</button>
</section>
</main>
<script src="features/settings.js"></script>
</body>
</html>
