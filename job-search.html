<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search - Myway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Myway<span>.</span></div>
            <div id="breadcrumb">
                <a href="student.html">Dashboard</a> > Job Search
            </div>
        </nav>
    </header>
    <main>
        <section class="page-header">
            <h1>Job Search</h1>
            <p>Find opportunities matched to your skills in Liberia</p>
        </section>
        <div class="job-search-container">
            <div class="search-filters">
                <input type="text" id="search-input" placeholder="Search jobs...">
                <label>
                    <input type="checkbox" id="persona-match"> Match my persona
                </label>
            </div>
            <div class="job-grid" id="job-grid"></div>
        </div>
    </main>
    <script src="features/job-search.js"></script>
</body>
</html>
